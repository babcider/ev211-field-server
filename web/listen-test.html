<!-- EV211 수신 스파이크 페이지 — 토큰 입력 + 채널(트랙) 선택 → 단일 트랙 구독, 전환 시 이전 트랙 해제 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EV211 수신 테스트</title>
  <!-- CDN 금지: 로컬 번들 UMD 사용 -->
  <script src="./vendor/livekit-client.umd.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; color: #111; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; font-size: 0.9rem; }
    input, select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.6rem 1.2rem; border: 0; border-radius: 8px; background: #111; color: #fff; cursor: pointer; }
    button:disabled { background: #999; cursor: not-allowed; }
    #log { margin-top: 1rem; padding: 0.75rem; background: #f6f6f6; border-radius: 8px; font-size: 0.85rem; white-space: pre-wrap; }
    .now { font-weight: 700; color: #16a34a; }
  </style>
</head>
<body>
  <h1>수신 테스트 (subscribe)</h1>

  <label>LiveKit WS URL</label>
  <input id="wsUrl" />

  <label>Subscribe 토큰 (scripts/token-subscribe.sh 로 발급)</label>
  <input id="token" placeholder="eyJ..." />

  <button id="connectBtn">룸 연결</button>
  <button id="disconnectBtn" disabled>연결 해제</button>

  <label>채널 선택 (단일 트랙만 재생)</label>
  <select id="channel" disabled></select>

  <p>현재 청취: <span id="nowPlaying" class="now">없음</span></p>
  <audio id="player" autoplay></audio>
  <div id="log">대기 중…</div>

  <script>
    // 서버 URL 기본값을 접속 방식에서 유도한다(mixed content·주소 오류 방지).
    // ⚠ LiveKit SDK 는 base URL 에 스스로 `/rtc` 를 붙인다. 기본값에 `/rtc` 를 넣으면
    //    실제 요청이 `/rtc/rtc/...` 가 되어 프록시가 404 를 낸다. 따라서 base URL 만 넘긴다.
    //    Caddy 의 `reverse_proxy /rtc*` 는 SDK 가 붙인 `/rtc` 경로와 일치하므로 그대로 동작한다.
    // - https 페이지(다른 노트북, :8443) → wss://<호스트>:8443 (Caddy 프록시)
    // - http://localhost (서버 노트북) → LiveKit 직결 ws://localhost:7880
    //   (8880 은 호스트 루프백 바인딩이라 서버 자신만 도달 가능. 외부 단말은 https:8443 만 사용)
    function defaultWsUrl() {
      const h = location.hostname;
      if (location.protocol === 'https:') return `wss://${h}:8443`;
      if (h === 'localhost' || h === '127.0.0.1') return 'ws://localhost:7880';
      // 외부 http 접근은 지원하지 않는다(8880 루프백 전용). https:8443 로 접속해야 한다.
      return `wss://${h}:8443`;
    }
    document.getElementById('wsUrl').value = defaultWsUrl();

    const LK = window.LivekitClient;
    const logEl = document.getElementById('log');
    const chSel = document.getElementById('channel');
    const player = document.getElementById('player');
    const nowEl = document.getElementById('nowPlaying');
    let room = null;
    // 채널명 → 발견된 오디오 트랙 publication 매핑
    const pubs = new Map();
    let currentPub = null;

    function log(msg) { logEl.textContent = new Date().toLocaleTimeString() + '  ' + msg + '\n' + logEl.textContent; }

    function refreshChannels() {
      chSel.innerHTML = '<option value="">— 채널 선택 —</option>';
      for (const name of pubs.keys()) {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        chSel.appendChild(opt);
      }
      chSel.disabled = pubs.size === 0;
    }

    document.getElementById('connectBtn').onclick = async () => {
      const url = document.getElementById('wsUrl').value.trim();
      const token = document.getElementById('token').value.trim();
      if (!token) { log('토큰을 입력하세요'); return; }

      // 자동 구독 끄기 → 선택 채널만 수동 구독 (단일 트랙 정책)
      room = new LK.Room({ autoSubscribe: false, adaptiveStream: false });

      room.on(LK.RoomEvent.TrackPublished, (pub, participant) => {
        const name = pub.trackName || pub.trackSid;
        pubs.set(name, pub);
        log('트랙 발견: ' + name + ' (from ' + participant.identity + ')');
        refreshChannels();
      });
      room.on(LK.RoomEvent.TrackUnpublished, (pub) => {
        const name = pub.trackName || pub.trackSid;
        pubs.delete(name);
        // 현재 재생 중인 트랙이 unpublish 되면 재생 상태·선택을 초기화한다.
        if (currentPub === pub || (currentPub && (currentPub.trackName || currentPub.trackSid) === name)) {
          currentPub = null;
          player.srcObject = null;
          nowEl.textContent = '없음';
          chSel.value = '';
          log('현재 채널 트랙 해제됨: ' + name);
        }
        refreshChannels();
      });
      room.on(LK.RoomEvent.TrackSubscribed, (track) => {
        if (track.kind === 'audio') { track.attach(player); log('구독+재생: ' + (track.name || track.sid)); }
      });

      await room.connect(url, token, { autoSubscribe: false });
      log('룸 연결됨: ' + room.name);

      // 이미 발행 중인 트랙 수집
      room.remoteParticipants.forEach(p => {
        p.trackPublications.forEach(pub => {
          if (pub.kind === 'audio') { pubs.set(pub.trackName || pub.trackSid, pub); }
        });
      });
      refreshChannels();

      document.getElementById('connectBtn').disabled = true;
      document.getElementById('disconnectBtn').disabled = false;
    };

    // 채널 전환: 이전 트랙 구독 해제 후 새 트랙만 구독
    chSel.onchange = async () => {
      const name = chSel.value;
      if (currentPub) { currentPub.setSubscribed(false); currentPub = null; nowEl.textContent = '없음'; }
      if (!name) return;
      const pub = pubs.get(name);
      if (pub) {
        pub.setSubscribed(true);
        currentPub = pub;
        nowEl.textContent = name;
        log('채널 전환 → ' + name);
      }
    };

    document.getElementById('disconnectBtn').onclick = async () => {
      if (room) { await room.disconnect(); }
      pubs.clear(); currentPub = null; refreshChannels();
      nowEl.textContent = '없음';
      log('연결 해제됨');
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('disconnectBtn').disabled = true;
    };
  </script>
</body>
</html>
