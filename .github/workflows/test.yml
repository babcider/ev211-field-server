name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install -r api/requirements-dev.txt

      - name: Run API tests
        working-directory: api
        run: python -m pytest -q

      - name: Validate OpenAPI
        run: openapi-spec-validator api/openapi.yaml

      - name: Audit runtime Python dependencies
        run: pip-audit -r api/requirements.lock

      - name: Validate shell and browser JavaScript syntax
        run: |
          bash -n scripts/*.sh scripts/ev211ctl
          awk '/<script>/{if ($0 ~ /^  <script>$/) {flag=1; next}} /<\/script>/{if(flag) exit} flag' web/admin.html | node --check

      - name: Validate production Compose merge
        run: |
          docker compose --env-file .env.example -f docker-compose.yml -f docker-compose.host.yml config --format json > /tmp/ev211-compose.json
          jq -e '.services.livekit.network_mode == "host" and (.services.livekit | has("ports") | not)' /tmp/ev211-compose.json

  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Scan complete Git history with Gitleaks
        run: |
          archive=gitleaks_8.30.1_linux_x64.tar.gz
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/$archive"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $archive" | sha256sum -c -
          tar -xzf "$archive" -C /tmp gitleaks
          /tmp/gitleaks git . --redact --no-banner --exit-code 1
